<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f7f0; }
        .hero { background: linear-gradient(135deg, #2d6a4f, #52b788);
                color: white; padding: 60px 0; text-align: center; }
        .upload-card { border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .btn-green { background-color: #2d6a4f; color: white; }
        .btn-green:hover { background-color: #1b4332; color: white; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🌿 Plant Disease Detection</h1>
        <p class="lead">Upload a leaf image to identify plant diseases instantly</p>
    </div>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card upload-card p-4">
                    <h4 class="text-center mb-4">Upload Leaf Image</h4>
                    <form action="/predict" method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <input type="file" name="file" class="form-control" accept="image/*" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-green btn-lg">
                                🔍 Detect Disease
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
