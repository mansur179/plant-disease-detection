<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f7f0; }
        .hero { background: linear-gradient(135deg, #2d6a4f, #52b788);
                color: white; padding: 40px 0; text-align: center; }
        .result-card { border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .btn-green { background-color: #2d6a4f; color: white; }
        .btn-green:hover { background-color: #1b4332; color: white; }
        .badge-disease { background-color: #d62828; font-size: 1rem; padding: 8px 16px; }
        .badge-healthy { background-color: #2d6a4f; font-size: 1rem; padding: 8px 16px; }
        .leaf-img { max-height: 300px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🌿 Detection Result</h1>
        <p class="lead">Here is what we found on your leaf</p>
    </div>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card result-card p-4">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='uploads/' + image_path) }}"
                             class="img-fluid leaf-img" alt="Uploaded Leaf">
                    </div>
                    <h4 class="text-center mb-3">
                        {% if "healthy" in prediction %}
                            <span class="badge badge-healthy rounded-pill">✅ {{ prediction }}</span>
                        {% else %}
                            <span class="badge badge-disease rounded-pill">⚠️ {{ prediction }}</span>
                        {% endif %}
                    </h4>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Confidence Score</label>
                        <div class="progress" style="height: 25px;">
                            <div class="progress-bar bg-success" style="width: {{ confidence }}%">
                                {{ confidence }}%
                            </div>
                        </div>
                    </div>
                    <div class="alert alert-success mt-3">
                        <strong>📋 Description:</strong> {{ description }}
                    </div>
                    <div class="d-grid mt-3">
                        <a href="/" class="btn btn-green btn-lg">🔍 Detect Another Leaf</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
